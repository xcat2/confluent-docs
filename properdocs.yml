site_name: Confluent
site_author: Confluent Community
site_url: https://xcat2.github.io/confluent-docs/
site_description: >-
  Confluent documentation

repo_name: xcat2/confluent-docs
repo_url: https://github.com/xcat2/confluent-docs
edit_uri: edit/master/docs/

copyright: Copyright &copy; Confluent Community

site_dir: _site

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: materialx
  language: en
  favicon: assets/icon.png
  #logo:
  features:
    - content.action.edit
    - content.action.view
    #- content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    #- toc.integrate
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: red
      accent: red
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to system preference


markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables

  # Python Markdown Extensions
  #- pymdownx.arithmatex:
  #    generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - tags
  - blog:
      blog_dir: release_notes
      blog_toc: true
  - rss:
      match_path: release_notes/posts/.*
      date_from_meta:
        as_creation: date
  # Social cards are dormant by default. To enable, install the Cairo system
  # libraries (e.g. libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev
  # libpng-dev) in the build environment and set the SOCIAL_CARDS env var.
  - social:
      enabled: !ENV [SOCIAL_CARDS, false]
  - privacy
  - glightbox
  - awesome-nav
  - document-dates:
      type: timeago
      position: bottom
      show_author: false
  - minify:
      minify_html: true
