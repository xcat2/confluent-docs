<svg xmlns="http://www.w3.org/2000/svg" width="640" height="470" viewBox="0 0 640 470" font-family="system-ui, sans-serif">
  <!-- containers -->
  <rect x="40" y="10" width="560" height="230" rx="6" fill="#fbe4e2" stroke="#c62828" stroke-width="1.5"/>
  <text x="320" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#b71c1c">confluent collective</text>
  <rect x="60" y="320" width="210" height="140" rx="6" fill="#e8eaed" stroke="#757575" stroke-width="1.5"/>
  <text x="165" y="344" text-anchor="middle" font-size="15" fill="#424242">managed nodes</text>
  <rect x="370" y="320" width="210" height="140" rx="6" fill="#e8eaed" stroke="#757575" stroke-width="1.5"/>
  <text x="475" y="344" text-anchor="middle" font-size="15" fill="#424242">managed nodes</text>
  <!-- links to managed nodes -->
  <g stroke="#8a8a8a" stroke-width="2">
    <line x1="160" y1="184" x2="165" y2="320"/>
    <line x1="480" y1="184" x2="475" y2="320"/>
  </g>
  <!-- collective mesh -->
  <g stroke="#b71c1c" stroke-width="2">
    <line x1="320" y1="79" x2="160" y2="184"/>
    <line x1="320" y1="79" x2="480" y2="184"/>
    <line x1="160" y1="184" x2="480" y2="184"/>
  </g>
  <!-- management nodes -->
  <g font-size="17" fill="#ffffff">
    <rect x="260" y="55" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="320" y="85" text-anchor="middle">head1</text>
    <rect x="100" y="160" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="160" y="190" text-anchor="middle">mgt1</text>
    <rect x="420" y="160" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="480" y="190" text-anchor="middle">mgt2</text>
  </g>
  <!-- managed node stacks -->
  <g font-size="13" fill="#111111">
    <rect x="100" y="356" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="108" y="372">node1</text>
    <rect x="122" y="378" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="130" y="394">node2</text>
    <rect x="144" y="400" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="152" y="416">node3</text>
    <rect x="410" y="356" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="418" y="372">node4</text>
    <rect x="432" y="378" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="440" y="394">node5</text>
    <rect x="454" y="400" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="462" y="416">node6</text>
  </g>
</svg>
