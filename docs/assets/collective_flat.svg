<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440" font-family="system-ui, sans-serif">
  <!-- containers -->
  <rect x="40" y="10" width="560" height="220" rx="6" fill="#fbe4e2" stroke="#c62828" stroke-width="1.5"/>
  <text x="320" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#b71c1c">confluent collective</text>
  <rect x="215" y="290" width="210" height="140" rx="6" fill="#e8eaed" stroke="#757575" stroke-width="1.5"/>
  <text x="320" y="314" text-anchor="middle" font-size="15" fill="#424242">managed nodes</text>
  <!-- links to managed nodes -->
  <g stroke="#8a8a8a" stroke-width="2">
    <line x1="160" y1="84" x2="280" y2="290"/>
    <line x1="320" y1="174" x2="320" y2="290"/>
    <line x1="480" y1="84" x2="360" y2="290"/>
  </g>
  <!-- collective mesh -->
  <g stroke="#b71c1c" stroke-width="2">
    <line x1="160" y1="84" x2="480" y2="84"/>
    <line x1="160" y1="84" x2="320" y2="174"/>
    <line x1="480" y1="84" x2="320" y2="174"/>
  </g>
  <!-- management nodes -->
  <g font-size="17" fill="#ffffff">
    <rect x="100" y="60" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="160" y="90" text-anchor="middle">mgt1</text>
    <rect x="420" y="60" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="480" y="90" text-anchor="middle">mgt3</text>
    <rect x="260" y="150" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="320" y="180" text-anchor="middle">mgt2</text>
  </g>
  <!-- managed node stack -->
  <g font-size="13" fill="#111111">
    <rect x="255" y="326" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="263" y="342">node1</text>
    <rect x="277" y="348" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="285" y="364">node2</text>
    <rect x="299" y="370" width="110" height="46" fill="#bdbdbd" stroke="#424242"/>
    <text x="307" y="386">node3</text>
  </g>
</svg>
