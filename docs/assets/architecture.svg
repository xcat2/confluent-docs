<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="900" viewBox="0 0 1040 900" font-family="system-ui, sans-serif">
  <!-- ===== clients (above confluent node) ===== -->
  <g stroke="#8e8e8e" stroke-width="1.5">
    <line x1="170" y1="58" x2="170" y2="80"/>
    <line x1="275" y1="58" x2="275" y2="80"/>
    <line x1="395" y1="58" x2="395" y2="80"/>
  </g>
  <g font-size="15" fill="#ffffff">
    <text x="70" y="44" font-size="14" fill="#8e8e8e">clients:</text>
    <rect x="130" y="20" width="80" height="38" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="170" y="44" text-anchor="middle">CLI</text>
    <rect x="220" y="20" width="110" height="38" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="275" y="44" text-anchor="middle">Web GUI</text>
    <rect x="340" y="20" width="110" height="38" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="395" y="44" text-anchor="middle">REST API</text>
  </g>

  <!-- ===== containers ===== -->
  <rect x="30" y="80" width="610" height="195" rx="6" fill="#fbe4e2" stroke="#c62828" stroke-width="1.5"/>
  <text x="335" y="106" text-anchor="middle" font-size="16" font-weight="bold" fill="#b71c1c">confluent node</text>
  <rect x="640" y="380" width="330" height="260" rx="6" fill="#fbe4e2" stroke="#c62828" stroke-width="1.5"/>
  <text x="805" y="408" text-anchor="middle" font-size="16" font-weight="bold" fill="#b71c1c">confluent collective node</text>

  <!-- ===== legend ===== -->
  <line x1="700" y1="275" x2="750" y2="275" stroke="#d32f2f" stroke-width="2.5"/>
  <text x="760" y="280" font-size="13" fill="#d32f2f">Mgmt / OS / Provisioning network</text>
  <line x1="700" y1="305" x2="750" y2="305" stroke="#8e8e8e" stroke-width="2.5"/>
  <text x="760" y="310" font-size="13" fill="#8e8e8e">BMC network</text>

  <!-- ===== network lines ===== -->
  <!-- OS / provisioning network (primary) -->
  <g stroke="#d32f2f" stroke-width="2" fill="none">
    <path d="M 300 211 V 320 M 97 320 H 682 M 97 320 V 418 M 317 320 V 418 M 682 320 V 368"/>
  </g>
  <!-- BMC network (primary) -->
  <g stroke="#8e8e8e" stroke-width="2" fill="none">
    <path d="M 370 211 V 345 M 192 345 H 933 M 192 345 V 418 M 412 345 V 418 M 933 345 V 368"/>
  </g>
  <!-- OS / provisioning network (collective member) -->
  <g stroke="#d32f2f" stroke-width="2" fill="none">
    <path d="M 780 607 V 660 M 657 660 H 847 M 657 660 V 708 M 847 660 V 708"/>
  </g>
  <!-- BMC network (collective member) -->
  <g stroke="#8e8e8e" stroke-width="2" fill="none">
    <path d="M 830 607 V 680 M 752 680 H 942 M 752 680 V 708 M 942 680 V 708"/>
  </g>

  <!-- ===== confluent node internals ===== -->
  <g fill="#ffffff">
    <rect x="60" y="125" width="160" height="105" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="140" y="150" text-anchor="middle" font-size="14" font-weight="bold">optional services</text>
    <text x="140" y="174" text-anchor="middle" font-size="13">tftp</text>
    <text x="140" y="194" text-anchor="middle" font-size="13">ntp</text>
    <text x="140" y="214" text-anchor="middle" font-size="13">dnsmasq</text>
    <rect x="460" y="125" width="160" height="80" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="540" y="150" text-anchor="middle" font-size="14" font-weight="bold">web services</text>
    <text x="540" y="178" text-anchor="middle" font-size="13">httpd or nginx</text>
  </g>
  <rect x="260" y="155" width="150" height="56" rx="6" fill="#b71c1c" stroke="#7f1414" stroke-width="1.5"/>
  <text x="335" y="189" text-anchor="middle" font-size="18" font-style="italic" fill="#ffffff">confluentd</text>

  <!-- ===== collective node internals ===== -->
  <g fill="#ffffff">
    <rect x="660" y="425" width="140" height="95" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="730" y="448" text-anchor="middle" font-size="13" font-weight="bold">optional services</text>
    <text x="730" y="470" text-anchor="middle" font-size="12.5">tftp</text>
    <text x="730" y="488" text-anchor="middle" font-size="12.5">ntp</text>
    <text x="730" y="506" text-anchor="middle" font-size="12.5">dnsmasq</text>
    <rect x="810" y="425" width="140" height="70" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="880" y="448" text-anchor="middle" font-size="13" font-weight="bold">web services</text>
    <text x="880" y="472" text-anchor="middle" font-size="12.5">httpd or nginx</text>
  </g>
  <rect x="730" y="555" width="150" height="52" rx="6" fill="#b71c1c" stroke="#7f1414" stroke-width="1.5"/>
  <text x="805" y="587" text-anchor="middle" font-size="18" font-style="italic" fill="#ffffff">confluentd</text>
  <!-- chips on collective node -->
  <rect x="660" y="368" width="44" height="24" rx="4" fill="#ef5350" stroke="#b71c1c"/>
  <text x="682" y="384" text-anchor="middle" font-size="13" fill="#ffffff">OS</text>
  <rect x="906" y="368" width="54" height="24" rx="4" fill="#757575" stroke="#424242"/>
  <text x="933" y="384" text-anchor="middle" font-size="13" fill="#ffffff">BMC</text>

  <!-- ===== compute node stacks (primary) ===== -->
  <g>
    <rect x="100" y="470" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="80" y="450" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="60" y="430" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <text x="145" y="462" text-anchor="middle" font-size="15" fill="#111111">compute node</text>
    <rect x="70" y="472" width="150" height="66" fill="#e8eaed" stroke="#757575"/>
    <g font-size="11.5" fill="#333333">
      <text x="78" y="490">pre/post/firstboot scripts</text>
      <text x="78" y="508">syncfiles</text>
      <text x="78" y="526">Ansible hooks</text>
    </g>
    <rect x="75" y="418" width="44" height="24" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="97" y="434" text-anchor="middle" font-size="13" fill="#ffffff">OS</text>
    <rect x="165" y="418" width="54" height="24" rx="4" fill="#757575" stroke="#424242"/>
    <text x="192" y="434" text-anchor="middle" font-size="13" fill="#ffffff">BMC</text>
  </g>
  <g>
    <rect x="320" y="470" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="300" y="450" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="280" y="430" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <text x="365" y="462" text-anchor="middle" font-size="15" fill="#111111">compute node</text>
    <rect x="290" y="472" width="150" height="66" fill="#e8eaed" stroke="#757575"/>
    <g font-size="11.5" fill="#333333">
      <text x="298" y="490">pre/post/firstboot scripts</text>
      <text x="298" y="508">syncfiles</text>
      <text x="298" y="526">Ansible hooks</text>
    </g>
    <rect x="295" y="418" width="44" height="24" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="317" y="434" text-anchor="middle" font-size="13" fill="#ffffff">OS</text>
    <rect x="385" y="418" width="54" height="24" rx="4" fill="#757575" stroke="#424242"/>
    <text x="412" y="434" text-anchor="middle" font-size="13" fill="#ffffff">BMC</text>
  </g>

  <!-- ===== compute node stacks (collective member) ===== -->
  <g>
    <rect x="660" y="760" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="640" y="740" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="620" y="720" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <text x="705" y="752" text-anchor="middle" font-size="15" fill="#111111">compute node</text>
    <rect x="630" y="762" width="150" height="66" fill="#e8eaed" stroke="#757575"/>
    <g font-size="11.5" fill="#333333">
      <text x="638" y="780">pre/post/firstboot scripts</text>
      <text x="638" y="798">syncfiles</text>
      <text x="638" y="816">Ansible hooks</text>
    </g>
    <rect x="635" y="708" width="44" height="24" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="657" y="724" text-anchor="middle" font-size="13" fill="#ffffff">OS</text>
    <rect x="725" y="708" width="54" height="24" rx="4" fill="#757575" stroke="#424242"/>
    <text x="752" y="724" text-anchor="middle" font-size="13" fill="#ffffff">BMC</text>
  </g>
  <g>
    <rect x="850" y="760" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="830" y="740" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <rect x="810" y="720" width="170" height="118" fill="#bdbdbd" stroke="#424242"/>
    <text x="895" y="752" text-anchor="middle" font-size="15" fill="#111111">compute node</text>
    <rect x="820" y="762" width="150" height="66" fill="#e8eaed" stroke="#757575"/>
    <g font-size="11.5" fill="#333333">
      <text x="828" y="780">pre/post/firstboot scripts</text>
      <text x="828" y="798">syncfiles</text>
      <text x="828" y="816">Ansible hooks</text>
    </g>
    <rect x="825" y="708" width="44" height="24" rx="4" fill="#ef5350" stroke="#b71c1c"/>
    <text x="847" y="724" text-anchor="middle" font-size="13" fill="#ffffff">OS</text>
    <rect x="915" y="708" width="54" height="24" rx="4" fill="#757575" stroke="#424242"/>
    <text x="942" y="724" text-anchor="middle" font-size="13" fill="#ffffff">BMC</text>
  </g>
</svg>
