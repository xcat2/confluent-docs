<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460" font-family="system-ui, sans-serif">
  <!-- containers -->
  <rect x="60" y="10" width="560" height="220" rx="6" fill="#fbe4e2" stroke="#c62828" stroke-width="1.5"/>
  <text x="340" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#b71c1c">confluent collective</text>
  <rect x="20" y="300" width="200" height="140" rx="6" fill="#e8eaed" stroke="#757575" stroke-width="1.5"/>
  <text x="120" y="324" text-anchor="middle" font-size="15" fill="#424242">managed nodes</text>
  <rect x="240" y="300" width="200" height="140" rx="6" fill="#e8eaed" stroke="#757575" stroke-width="1.5"/>
  <text x="340" y="324" text-anchor="middle" font-size="15" fill="#424242">managed nodes</text>
  <rect x="460" y="300" width="200" height="140" rx="6" fill="#e8eaed" stroke="#757575" stroke-width="1.5"/>
  <text x="560" y="324" text-anchor="middle" font-size="15" fill="#424242">managed nodes</text>
  <!-- links to managed nodes -->
  <g stroke="#8a8a8a" stroke-width="2">
    <line x1="180" y1="84" x2="120" y2="300"/>
    <line x1="340" y1="174" x2="340" y2="300"/>
    <line x1="500" y1="84" x2="560" y2="300"/>
  </g>
  <!-- collective mesh -->
  <g stroke="#b71c1c" stroke-width="2">
    <line x1="180" y1="84" x2="500" y2="84"/>
    <line x1="180" y1="84" x2="340" y2="174"/>
    <line x1="500" y1="84" x2="340" y2="174"/>
  </g>
  <!-- management nodes -->
  <g font-size="17" fill="#ffffff">
    <rect x="120" y="60" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="180" y="90" text-anchor="middle">mgt1</text>
    <rect x="440" y="60" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="500" y="90" text-anchor="middle">mgt3</text>
    <rect x="280" y="150" width="120" height="48" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
    <text x="340" y="180" text-anchor="middle">mgt2</text>
  </g>
  <!-- managed node stacks -->
  <g font-size="12.5" fill="#111111">
    <rect x="48" y="336" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="55" y="351">node1</text>
    <rect x="68" y="356" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="75" y="371">node2</text>
    <rect x="88" y="376" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="95" y="391">node3</text>
    <rect x="268" y="336" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="275" y="351">node4</text>
    <rect x="288" y="356" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="295" y="371">node5</text>
    <rect x="308" y="376" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="315" y="391">node6</text>
    <rect x="488" y="336" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="495" y="351">node7</text>
    <rect x="508" y="356" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="515" y="371">node8</text>
    <rect x="528" y="376" width="104" height="44" fill="#bdbdbd" stroke="#424242"/>
    <text x="535" y="391">node9</text>
